{% extends 'base.html' %}
{% block title %}Add Technician — Issue Tracker{% endblock %}

{% block content %}
<div class="breadcrumb"><a href="/technicians">← Back to technicians</a></div>
<div class="page-heading"><h1>Add technician</h1></div>

<div class="card" style="max-width: 500px;">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/technicians/new">
        <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name"
                   placeholder="e.g. Alice Nguyen" required>
        </div>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email"
                   placeholder="e.g. alice@example.com" required>
        </div>
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">Add technician</button>
            <a href="/technicians" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
