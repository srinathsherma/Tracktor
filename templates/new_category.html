{% extends 'base.html' %}
{% block title %}Add Category — Issue Tracker{% endblock %}

{% block content %}
<div class="breadcrumb"><a href="/categories">← Back to categories</a></div>
<div class="page-heading"><h1>Add category</h1></div>

<div class="card" style="max-width: 500px;">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/categories/new">
        <div class="form-group">
            <label for="name">Category name</label>
            <input type="text" id="name" name="name"
                   placeholder="e.g. Hardware issue" required>
        </div>
        <div class="form-group">
            <label for="description">
                Description <span class="optional">(optional)</span>
            </label>
            <textarea id="description" name="description" style="height:80px"
                      placeholder="Brief description of this category..."></textarea>
        </div>
        <div class="btn-row">
            <button type="submit" class="btn btn-primary">Add category</button>
            <a href="/categories" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
